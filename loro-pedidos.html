<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos Camisetas Los Lorolos 2027</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--black:#080808;--white:#f0ece4;--gold:#c9a84c;--goldl:#e8cb7a;--muted:#777;--border:rgba(201,168,76,0.18);--ok:#4caf7d;--err:#c94c4c;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--black);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.6;}
.page-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.38em;color:var(--gold);text-transform:uppercase;margin-bottom:8px;position:relative;z-index:1;opacity:.75;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--white);margin-bottom:6px;position:relative;z-index:1;text-align:center;}
.page-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--muted);margin-bottom:36px;position:relative;z-index:1;}
.form-wrap{position:relative;z-index:1;width:100%;max-width:400px;background:#111;border:1px solid var(--border);border-radius:4px;padding:32px 28px;}
.form-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5;}
.section-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.35em;color:var(--gold);text-transform:uppercase;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.field{margin-bottom:16px;}
label{display:block;font-family:'Cinzel',serif;font-size:8px;letter-spacing:.3em;color:var(--muted);text-transform:uppercase;margin-bottom:7px;}
input,select,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:2px;padding:11px 14px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
select{cursor:pointer;}
select option{background:#1a1a1a;color:var(--white);}
textarea{resize:vertical;min-height:70px;}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.2);}
input:focus,select:focus,textarea:focus{border-color:rgba(201,168,76,.5);}
.tallas{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.talla-opt{display:none;}
.talla-lbl{display:flex;align-items:center;justify-content:center;height:38px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:2px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;color:var(--muted);cursor:pointer;transition:all .2s;}
.talla-opt:checked+.talla-lbl{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.1);}
.qty-row{display:flex;gap:8px;align-items:center;}
.qty-btn{width:38px;height:38px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:2px;color:var(--gold);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0;}
.qty-btn:hover{background:rgba(201,168,76,.1);}
.qty-val{flex:1;text-align:center;font-family:'Cinzel',serif;font-size:18px;color:var(--white);}
.divider{border:none;border-top:1px solid var(--border);margin:22px 0;}
.alert{background:rgba(201,76,76,.1);border:1px solid rgba(201,76,76,.3);border-radius:2px;padding:11px 14px;font-size:13px;color:#e88080;margin-bottom:16px;display:none;}
.btn-main{width:100%;background:var(--gold);color:var(--black);border:none;border-radius:2px;padding:14px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:background .2s,transform .1s,opacity .2s;position:relative;}
.btn-main:hover:not(:disabled){background:var(--goldl);}
.btn-main:active:not(:disabled){transform:scale(.98);}
.btn-main:disabled{opacity:.45;cursor:not-allowed;}
.loader{display:none;width:13px;height:13px;border:2px solid rgba(0,0,0,.25);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;position:absolute;right:15px;top:50%;transform:translateY(-50%);}
.loading .loader{display:block;}
@keyframes spin{to{transform:translateY(-50%) rotate(360deg);}}
.success-wrap{position:relative;z-index:1;width:100%;max-width:400px;text-align:center;display:none;animation:rise .5s cubic-bezier(.16,1,.3,1);}
.success-wrap.show{display:block;}
@keyframes rise{from{opacity:0;transform:translateY(14px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.success-icon{width:56px;height:56px;margin:0 auto 20px;border:1px solid rgba(76,175,125,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:14px;color:var(--ok);}
.success-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--white);margin-bottom:10px;}
.success-msg{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:28px;}
.success-card{background:#111;border:1px solid var(--border);border-radius:4px;padding:20px 24px;margin-bottom:24px;text-align:left;}
.srow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(201,168,76,.07);font-size:13px;}
.srow:last-child{border-bottom:none;}
.sk{color:var(--muted);}
.sv{color:var(--white);}
.sv.hl{color:var(--goldl);font-family:'Cinzel',serif;font-size:15px;}
.btn-nuevo{background:transparent;border:1px solid var(--border);border-radius:2px;padding:11px 24px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);cursor:pointer;transition:all .2s;}
.btn-nuevo:hover{border-color:var(--gold);}
</style>
</head>
<body>
<p class="page-label">Los Lorolos</p>
<h1 class="page-title">Pedido de Sudadera</h1>
<p class="page-sub">Temporada 2026&ndash;27 &middot; Black Swan</p>

<div class="form-wrap" id="formWrap">
  <div class="alert" id="alertErr"></div>
  <div class="section-label">Tus datos</div>
  <div class="field">
    <label>Nombre completo</label>
    <input type="text" id="iNombre" placeholder="Laura Garcia" autocomplete="off">
  </div>
  <div class="field">
    <label>Correo electronico</label>
    <input type="email" id="iEmail" placeholder="laura@gmail.com" autocomplete="off">
  </div>
  <hr class="divider">
  <div class="section-label">Tu pedido</div>
  <div class="field">
    <label>Talla</label>
    <div class="tallas">
      <input class="talla-opt" type="radio" name="talla" id="tXS" value="XS"><label class="talla-lbl" for="tXS">XS</label>
      <input class="talla-opt" type="radio" name="talla" id="tS"  value="S"> <label class="talla-lbl" for="tS">S</label>
      <input class="talla-opt" type="radio" name="talla" id="tM"  value="M" checked><label class="talla-lbl" for="tM">M</label>
      <input class="talla-opt" type="radio" name="talla" id="tL"  value="L"> <label class="talla-lbl" for="tL">L</label>
      <input class="talla-opt" type="radio" name="talla" id="tXL" value="XL"><label class="talla-lbl" for="tXL">XL</label>
    </div>
  </div>
  <div class="field">
    <label>Cantidad</label>
    <div class="qty-row">
      <button class="qty-btn" type="button" onclick="cambiarQty(-1)">-</button>
      <span class="qty-val" id="qtyVal">1</span>
      <button class="qty-btn" type="button" onclick="cambiarQty(1)">+</button>
    </div>
  </div>
  <div class="field">
    <label>Color</label>
    <select id="iColor">
      <option value="Negro">Negro</option>
      <option value="Blanco">Blanco</option>
      <option value="Gris">Gris</option>
    </select>
  </div>
  <div class="field">
    <label>Notas (opcional)</label>
    <textarea id="iNotas" placeholder="Alguna indicacion adicional..."></textarea>
  </div>
  <hr class="divider">
  <button class="btn-main" id="btnEnviar" onclick="enviar()">
    Confirmar pedido
    <div class="loader"></div>
  </button>
</div>

<div class="success-wrap" id="successWrap">
  <div class="success-icon">OK</div>
  <div class="success-title">Pedido recibido</div>
  <p class="success-msg">Hemos registrado tu pedido correctamente.<br>Recibiras un email de confirmacion en breve.</p>
  <div class="success-card" id="successCard"></div>
  <button class="btn-nuevo" onclick="nuevoPedido()">Hacer otro pedido</button>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxRk7CSk5lVs0AErIqvGw_7Qfb9yBINl-zn5b_YzmaAa0yJ36b6xfJbDUI4e8DB_3bA/exec';
const SIN_RED = SCRIPT_URL === 'https://script.google.com/macros/s/AKfycbxRk7CSk5lVs0AErIqvGw_7Qfb9yBINl-zn5b_YzmaAa0yJ36b6xfJbDUI4e8DB_3bA/exec';
let qty=1;

function cambiarQty(d){qty=Math.max(1,Math.min(10,qty+d));document.getElementById('qtyVal').textContent=qty;}

async function enviar(){
  const nombre=document.getElementById('iNombre').value.trim();
  const email=document.getElementById('iEmail').value.trim();
  const talla=document.querySelector('input[name="talla"]:checked')?.value||'';
  const color=document.getElementById('iColor').value;
  const notas=document.getElementById('iNotas').value.trim();
  const btn=document.getElementById('btnEnviar');
  hideAlert();
  if(!nombre){showAlert('Introduce tu nombre.');return;}
  if(!email||!validEmail(email)){showAlert('Introduce un email valido.');return;}
  if(!talla){showAlert('Selecciona una talla.');return;}
  btn.disabled=true;btn.classList.add('loading');
  if(!SIN_RED){
    const url=SCRIPT_URL+'?action=submitPedido&nombre='+enc(nombre)+'&email='+enc(email)+'&talla='+enc(talla)+'&cantidad='+qty+'&color='+enc(color)+'&notas='+enc(notas);
    try{await fetch(url,{mode:'no-cors'});}catch{}
  }
  await delay(700);
  btn.disabled=false;btn.classList.remove('loading');
  mostrarExito(nombre,talla,qty,color);
}

function mostrarExito(nombre,talla,cantidad,color){
  document.getElementById('formWrap').style.display='none';
  document.getElementById('successCard').innerHTML=`<div class="srow"><span class="sk">Nombre</span><span class="sv">${esc(nombre)}</span></div><div class="srow"><span class="sk">Talla</span><span class="sv hl">${talla}</span></div><div class="srow"><span class="sk">Cantidad</span><span class="sv">${cantidad}</span></div><div class="srow"><span class="sk">Color</span><span class="sv">${color}</span></div><div class="srow"><span class="sk">Estado</span><span class="sv">Pendiente de confirmacion</span></div>`;
  document.getElementById('successWrap').classList.add('show');
}

function nuevoPedido(){
  document.getElementById('successWrap').classList.remove('show');
  document.getElementById('formWrap').style.display='block';
  ['iNombre','iEmail','iNotas'].forEach(id=>document.getElementById(id).value='');
  qty=1;document.getElementById('qtyVal').textContent='1';
  document.getElementById('iColor').selectedIndex=0;hideAlert();
}

function showAlert(msg){const e=document.getElementById('alertErr');e.textContent=msg;e.style.display='block';}
function hideAlert(){document.getElementById('alertErr').style.display='none';}
function validEmail(e){return/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);}
function enc(s){return encodeURIComponent(s);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
</body>
</html>
